/* الكلاس الذي سيتم إضافته للرابط النشط */
.sidebar-link.active svg,
.sidebar-link:hover svg {
    /* هذا الفلتر يحول اللون الأسود/الرمادي إلى درجة الكحلي #000080 تقريباً */
    filter: invert(8%) sepia(94%) saturate(4632%) hue-rotate(233deg) brightness(91%) contrast(144%);
    transition: filter 0.3s ease;
}

/* لتغيير لون النص أيضاً عند النشاط */
.sidebar-link.active .sidebar-link-text {
    color:  #0e3a53; 
    font-weight: bold;
}


.sidebar-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}
.sidebar-link.active .sidebar-icon {
    filter: invert(15%) sepia(35%) saturate(1200%) hue-rotate(165deg) brightness(90%) contrast(95%);
}
/* الحالة النشطة */
.sidebar-link.active {
  background-color: white;
  color: #0e3a53; /* نفس لون الخلفية تقريباً */
}

/* لو عندك svg بدك تغير لونه */
.sidebar-link.active svg path {
  fill: #0e3a53;
}

</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const navLinks = document.querySelectorAll(".nav-link");

  // 1. عند تحميل الصفحة: ابحث عن القيمة المخزنة واجعل الزر نشطاً
  const activePage = localStorage.getItem("activeSidebarItem");
  if (activePage) {
    const activeLink = document.querySelector(`[data-page="${activePage}"]`);
    if (activeLink) {
      activeLink.classList.add("active");
    }
  } else {
    // اختياري: جعل "لوحة التحكم" نشطة افتراضياً إذا لم يتم اختيار شيء
    document.querySelector('[data-page="dashboard"]')?.classList.add("active");
  }

  // 2. عند الضغط على أي رابط: خزن اسمه في الـ localStorage
  navLinks.forEach((link) => {
    link.addEventListener("click", function () {
      const pageName = this.getAttribute("data-page");
      localStorage.setItem("activeSidebarItem", pageName);
    });
  });
});
</script>
