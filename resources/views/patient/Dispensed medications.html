    <style>
     
.title h2{font-size:20px;color:#0d3b66;margin-bottom:5px}

*{
              font-family: 'Tajawal', sans-serif;            

}
  
  :root {
            --bg-color: #f4f7f9;
            --primary-blue: #1b75c4;
            --text-dark: #053052;
            --text-gray: #6184A0;
            --border-color: #eee;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px;
            color: var(--text-dark);
        }


        

        /* --- سجل الأدوية المصروفة (الجدول) --- */
        .section-header {
            justify-content: center;
            text-align: right;
            margin-bottom: 30px;
        }

        .section-header h1 {
            color: var(--text-dark);
            font-size: 28px;
            margin-bottom: 5px;
        }

        .section-header p {
            color: var(--text-gray);
            margin: 0;
        }

        .car-table {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e6eef5;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        thead tr {
            background-color: #fcfcfc;
        }

        th {
            color: #8fa0ad;
            font-weight: 500;
            padding: 15px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
            /* الخطوط الرأسية الخفيفة في الرأس فقط حسب الصورة */
            border-left: 1px solid #f0f0f0;
        }

        th:last-child { border-left: none; }

        td {
            padding: 20px 15px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #444;
        }

        /* إخفاء الحدود الرأسية في جسم الجدول */
        tbody td {
            border-left: none;
            border-right: none;
        }

        .med-name { font-weight: 700; color: #1a1a1a; }
        .points { color: #3b82f6; font-weight: bold; }
        
        .view-all-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #9ea7ad;
            text-decoration: none;
            font-size: 14px;
        }
</style>
