<!DOCTYPE html>

<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>المخزون</title>
<link href="../css/style.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
     <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');

    :root {
        
            --primary-blue: #002d52;
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --text-gray: #666;
            --success-green: #d1fae5;
            --success-text: #059669;
            --warning-orange: #fef3c7;
            --warning-text: #d97706;
            --danger-red: #fee2e2;
            --danger-text: #dc2626;
        }
    /* Main Content */
        .main-content { flex: 1; overflow-y: auto; }
        .header-top { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; background: var(--primary-blue); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .search-section { max-width: 1000px; margin-top: 20px ; }
        .section-title { text-align: center; margin-bottom: 30px; }
        .section-title h1 { color: var(--primary-blue); font-size: 1.8rem; }

        .search-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-group { display: flex; gap: 10px; }
        .input-group input, .input-group select { padding: 12px; border: 1px solid #eee; border-radius: 8px; background: #f9f9f9; outline: none; }
        .input-group input { flex: 2; }
        .input-group select { flex: 1; }
        .btn-search { background: var(--primary-blue); color: white; border: none; padding: 0 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* Results */
        .results-container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .medicine-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .med-info-main { display: flex; align-items: center; gap: 20px; }
        .status-badge { padding: 6px 20px; border-radius: 6px; font-size: 15px; font-weight: 100; min-width: 110px; text-align: center; }
        
        .status-available { background: var(--success-green); color: var(--success-text); }
        .status-limited { background: var(--warning-orange); color: var(--warning-text); }
        .status-none { background: var(--danger-red); color: var(--danger-text); }
        .hidden { display: none; }
</style>
</head>

<body data-page="profile">
<div class="app">
 

  <iframe class="sidebar-frame" src="./sidebar - 2.html " title="Sidebar"></iframe>

  <div class="main">

    <div id="headerMount">
    </div>
<div class="content profile-content">
  <div class="profile-container">
    <div class="profile-header">
      <h1 class="profile-title" style="margin-bottom: 10px;   font-family: 'Tajawal', sans-serif;margin-top: 20px;"> البحث عن توفر الأدوية</h1>
      <p class="profile-desc" style="   font-family: 'Tajawal', sans-serif;">اعرف إن كان الدواء متوفرًا قبل التوجه إلى المركز الطبي</p>
    </div>






<div class="search-section">

            <div class="search-card">
                <h3 style="   font-family: 'Tajawal', sans-serif;">البحث عن توفر الأدوية</h3>
                <p style="   font-family: 'Tajawal', sans-serif;
font-weight: 400;
font-style: Regular;
font-size: 14px;
color:  #8E8E8E;
;
">ابحث عن الدواء في المراكز الطبية المختلفة</p>
                <div class="input-group">
                    <input type="text" id="medicineInput" style="   font-family: 'Tajawal', sans-serif;" placeholder="أدخل اسم الدواء هنا ..">
                    <select id="centerSelect" style="   font-family: 'Tajawal', sans-serif;">
                        <option value="all" >جميع المراكز</option>
                        <option value="shifa">مجمع الشفاء الطبي</option>
                        <option value="euro">مستشفى غزة الأوروبي</option>
                        <option value="nasser">مجمع ناصر الطبي</option> </select>
                    <button class="btn-search" onclick="searchMedicine()" style="   font-family: 'Tajawal', sans-serif;background: linear-gradient(90deg, #0B6CB8 0%, #0B395D 100%);
box-shadow: 0px 4px 4px 0px #00000040;">
                        <i class="fas fa-search"></i> بحث
                    </button>
                </div>
            </div>
        </div>

        <div class="results-container hidden" id="resultsArea" style="font-family: 'Tajawal', sans-serif;">
            <div id="resultsCount" style="margin-bottom: 10px; font-size: 0.8rem; color: #666;"></div>
            <div id="resultsList"></div>
        </div>
    </div>

    <script>
        const medicinesData = [
            {
                name: "بنادول اكسترا 500 ملجم",
                center: "shifa",
                centerName: "مجمع الشفاء الطبي",
                expiry: "07/2027",
                quantity: "كمية جيدة",
                statusClass: "status-available",
                statusText: "متوفر",
                iconColor: "#10b981"
            },
            {
                name: "بنادول اكسترا 500 ملجم",
                center: "euro",
                centerName: "مستشفى غزة الأوروبي",
                expiry: "05/2027",
                quantity: "أقل من 10",
                statusClass: "status-limited",
                statusText: "كمية محدودة",
                iconColor: "#f59e0b",
            },
            {
                name: "بنادول اكسترا 500 ملجم",
                center: "nasser", // تم تعديل البيانات لترتبط بمجمع ناصر
                centerName: "مجمع ناصر الطبي",
                expiry: "غير محدد",
                quantity: "0",
                statusClass: "status-none",
                statusText: "غير متوفر",
                iconColor: "#ef4444"
            }
        ];

        function searchMedicine() {
            const query = document.getElementById('medicineInput').value.trim();
            const selectedCenter = document.getElementById('centerSelect').value;
            const resultsArea = document.getElementById('resultsArea');
            const resultsList = document.getElementById('resultsList');
            
            if (query === "") return;

            // الفلترة بناءً على الاسم المكتوب والمركز المختار
            const filtered = medicinesData.filter(med => {
                const nameMatch = med.name.includes(query);
                const centerMatch = (selectedCenter === "all") || (med.center === selectedCenter);
                return nameMatch && centerMatch;
            });

            resultsList.innerHTML = "";
            document.getElementById('resultsCount').innerText = `نتائج البحث (${filtered.length})`;

            filtered.forEach(med => {
                resultsList.innerHTML += `
                    <div class="medicine-card">
                        <div class="med-info-main">
                            <i class="fas fa-pills" style="font-size: 2rem; color: ${med.iconColor}"></i>
                            <div class="med-details">
                                <h3>${med.name}</h3>
                                <p style="font-size: 0.8rem; color:#999">${med.centerName} | انتهاء: ${med.expiry}</p>
                            </div>
                        </div>
                        <div style="text-align:center">
                            <small style="color:#999">الكمية التقريبية</small><br>
                            <b>${med.quantity}</b>
                        </div>
                        <div class="status-badge ${med.statusClass}">${med.statusText}</div>
                    </div>
                `;
            });

            resultsArea.classList.remove('hidden');
        }
    </script>
<script src="../js/main.js"></script>
<script src="../js/password.js"></script>
<script src="../js/include-header.js"></script>
</body>
</html>
